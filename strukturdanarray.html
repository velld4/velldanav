<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Struktur & Array • Cyber Data</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#0f172a,#020617 55%),
    linear-gradient(135deg,#020617,#111827,#1e293b);

    color:white;

    position:relative;
}

/* ========================= */
/* BINTANG */
/* ========================= */

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:blink 4s infinite alternate;
}

@keyframes blink{

    from{
        opacity:.2;
        transform:scale(.5);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ========================= */
/* GLOW */
/* ========================= */

.glow{

    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(0,255,255,.25),
    transparent 70%);

    top:-180px;
    right:-180px;

    filter:blur(40px);

    animation:floatGlow 8s ease-in-out infinite alternate;
}

@keyframes floatGlow{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(60px);
    }
}

/* ========================= */
/* RING */
/* ========================= */

.ring{

    position:absolute;

    width:700px;
    height:700px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.05);

    animation:rotate 35s linear infinite;
}

.ring::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:#00f5ff;

    top:-9px;
    left:50%;

    box-shadow:0 0 25px #00f5ff;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* ========================= */
/* CONTAINER */
/* ========================= */

.container{

    position:relative;

    z-index:5;

    width:450px;
    max-width:92vw;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);

    animation:showUp 1s ease;
}

@keyframes showUp{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* BACK BUTTON */
/* ========================= */

.btn-back{

    position:absolute;

    top:20px;
    left:20px;

    border:none;

    padding:10px 18px;

    border-radius:15px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    transition:.3s;
}

.btn-back:hover{

    transform:
    translateY(-4px)
    scale(1.04);

    box-shadow:
    0 10px 25px rgba(0,255,255,.4);
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:45px;

    background:
    linear-gradient(135deg,#00f5ff,#7c3aed);

    box-shadow:
    0 0 35px rgba(0,255,255,.45);

    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ========================= */
/* TITLE */
/* ========================= */

h1{

    margin-top:20px;

    text-align:center;

    font-size:2.2em;

    background:
    linear-gradient(90deg,#fff,#00f5ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{

    text-align:center;

    margin-top:10px;

    opacity:.8;
}

/* ========================= */
/* BOX */
/* ========================= */

.box{

    margin-top:25px;

    background:rgba(255,255,255,.05);

    border-radius:25px;

    padding:25px;

    border:1px solid rgba(255,255,255,.06);
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn-data{

    width:100%;

    border:none;

    padding:15px;

    border-radius:18px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    box-shadow:
    0 10px 25px rgba(0,255,255,.3);

    transition:.3s;
}

.btn-data:hover{

    transform:
    translateY(-5px)
    scale(1.02);

    box-shadow:
    0 15px 35px rgba(0,255,255,.4);
}

/* ========================= */
/* HASIL */
/* ========================= */

#hasil{

    margin-top:20px;

    max-height:320px;

    overflow-y:auto;

    padding-right:5px;
}

/* SCROLL */

#hasil::-webkit-scrollbar{
    width:6px;
}

#hasil::-webkit-scrollbar-thumb{
    background:#00f5ff;
    border-radius:20px;
}

/* ========================= */
/* ITEM */
/* ========================= */

.item{

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.05);

    padding:14px;

    border-radius:16px;

    margin:10px 0;

    transition:.3s;

    animation:fade .5s ease;
}

.item:hover{

    transform:translateX(8px);

    background:rgba(255,255,255,.13);
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* SUBTITLE */
/* ========================= */

.sub{

    margin-top:18px;

    margin-bottom:10px;

    color:#00f5ff;

    font-weight:bold;

    letter-spacing:1px;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:1.8em;
    }
}

</style>
</head>

<body>

<!-- STARS -->

<script>

for(let i=0;i<140;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=
    (2+Math.random()*4)+"s";

    document.body.appendChild(star);
}

</script>

<div class="glow"></div>

<div class="ring"></div>

<!-- MAIN -->

<div class="container">

    <!-- BACK -->

    <button class="btn-back"
    onclick="kembali()">
        ⬅ Back
    </button>

    <!-- LOGO -->

    <div class="logo">
        📦
    </div>

    <!-- TITLE -->

    <h1>Struktur & Array</h1>

    <p class="desc">
        Menampilkan data array & object dengan gaya cyber 🚀
    </p>

    <!-- BOX -->

    <div class="box">

        <button
        class="btn-data"
        onclick="tampilkanData()">

            ⚡ Tampilkan Data

        </button>

        <div id="hasil"></div>

    </div>

</div>

<script>

/* BACK */

function kembali(){

    window.location.href="index.html";
}

/* DATA */

function tampilkanData(){

    // ARRAY

    let buah = [
        "🍎 Apel",
        "🍊 Jeruk",
        "🥭 Mangga",
        "🍇 Anggur"
    ];

    // OBJECT

    let siswa = {

        nama : "Aurell",
        kelas : "XI TJKT 1",
        umur : 16
    };

    let output = "";

    output += `
    <div class="sub">
        🍎 Array Buah
    </div>
    `;

    for(let i=0;i<buah.length;i++){

        output += `
        <div class="item">
            ${i+1}. ${buah[i]}
        </div>
        `;
    }

    output += `
    <div class="sub">
        👤 Data Siswa
    </div>
    `;

    output += `
    <div class="item">
        🧑 Nama : ${siswa.nama}
    </div>

    <div class="item">
        🏫 Kelas : ${siswa.kelas}
    </div>

    <div class="item">
        🎂 Umur : ${siswa.umur} Tahun
    </div>
    `;

    document.getElementById("hasil").innerHTML = output;
}

</script>

</body>
</html>
