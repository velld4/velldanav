<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Percabangan Javascript • Neon Space</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    background:
    radial-gradient(circle at top,#1e1b4b,#020617 50%),
    linear-gradient(135deg,#020617,#0f172a,#111827);

    position:relative;
}

/* ========================= */
/* BINTANG */
/* ========================= */

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:blink 3s infinite alternate;
}

@keyframes blink{

    from{
        opacity:.2;
        transform:scale(.5);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ========================= */
/* GLOW */
/* ========================= */

.glow{

    position:absolute;

    width:450px;
    height:450px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(0,255,255,.25),
    transparent 70%);

    top:-150px;
    right:-150px;

    filter:blur(30px);

    animation:moveGlow 8s ease-in-out infinite alternate;
}

@keyframes moveGlow{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(40px);
    }
}

/* ========================= */
/* ORBIT */
/* ========================= */

.orbit{

    position:absolute;

    width:650px;
    height:650px;

    border:1px solid rgba(255,255,255,.05);

    border-radius:50%;

    animation:rotate 25s linear infinite;
}

.orbit::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    background:#00f5ff;

    border-radius:50%;

    top:-9px;
    left:50%;

    box-shadow:0 0 20px #00f5ff;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* ========================= */
/* CARD */
/* ========================= */

.container{

    position:relative;
    z-index:5;

    width:430px;
    max-width:92vw;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);

    animation:showUp 1s ease;
}

@keyframes showUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* BACK BUTTON */
/* ========================= */

.btn-back{

    position:absolute;

    top:20px;
    left:20px;

    border:none;

    padding:10px 18px;

    border-radius:15px;

    font-weight:bold;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    transition:.3s;
}

.btn-back:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    box-shadow:
    0 10px 25px rgba(0,255,255,.4);
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:45px;

    background:
    linear-gradient(135deg,#00f5ff,#7c3aed);

    box-shadow:
    0 0 40px rgba(0,255,255,.35);

    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ========================= */
/* TITLE */
/* ========================= */

h1{

    margin-top:20px;

    text-align:center;

    font-size:2.2em;

    background:
    linear-gradient(90deg,#fff,#00f5ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{

    text-align:center;

    margin-top:8px;

    opacity:.8;
}

/* ========================= */
/* INPUT */
/* ========================= */

.box{

    margin-top:25px;

    display:flex;
    flex-direction:column;
    gap:15px;
}

input{

    padding:15px;

    border:none;

    border-radius:18px;

    outline:none;

    background:rgba(255,255,255,.10);

    color:white;

    font-size:16px;

    transition:.3s;
}

input:focus{

    transform:scale(1.03);

    box-shadow:
    0 0 25px rgba(0,255,255,.3);
}

input::placeholder{

    color:rgba(255,255,255,.6);
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn-check{

    border:none;

    padding:15px;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:16px;

    font-weight:bold;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    box-shadow:
    0 10px 25px rgba(0,255,255,.3);

    transition:.3s;
}

.btn-check:hover{

    transform:
    translateY(-5px)
    scale(1.03);
}

/* ========================= */
/* HASIL */
/* ========================= */

#hasil{

    margin-top:20px;

    padding:18px;

    border-radius:18px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.06);

    font-size:18px;

    text-align:center;

    transition:.4s;

    animation:fade .5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:1.8em;
    }
}

</style>
</head>

<body>

<!-- BINTANG -->

<script>

for(let i=0;i<120;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=
    (2+Math.random()*4)+"s";

    document.body.appendChild(star);
}

</script>

<div class="glow"></div>

<div class="orbit"></div>

<!-- CONTAINER -->

<div class="container">

    <!-- BACK -->

    <button class="btn-back"
    onclick="kembali()">
        ⬅ Back
    </button>

    <!-- LOGO -->

    <div class="logo">
        🎯
    </div>

    <!-- TITLE -->

    <h1>Percabangan JS</h1>

    <p class="desc">
        Cek nilai kamu dengan sistem If - Else 🚀
    </p>

    <!-- BOX -->

    <div class="box">

        <input
        type="number"
        id="nilai"
        placeholder="Masukkan nilai kamu">

        <button
        class="btn-check"
        onclick="cekNilai()">

            ⚡ Cek Nilai

        </button>

        <div id="hasil">
            Hasil akan muncul di sini...
        </div>

    </div>

</div>

<script>

/* KEMBALI */

function kembali(){

    window.location.href="index.html";
}

/* CEK NILAI */

function cekNilai(){

    let nilai=
    document.getElementById("nilai").value;

    let hasil=
    document.getElementById("hasil");

    if(nilai===""){

        hasil.innerHTML=
        "⚠️ Masukkan nilai terlebih dahulu!";

        hasil.style.boxShadow=
        "0 0 20px rgba(255,255,255,.2)";

        return;
    }

    if(nilai>=90){

        hasil.innerHTML=
        "🔥 Nilai A • Sangat Baik";

        hasil.style.boxShadow=
        "0 0 25px rgba(0,255,150,.5)";
    }

    else if(nilai>=75){

        hasil.innerHTML=
        "🚀 Nilai B • Baik";

        hasil.style.boxShadow=
        "0 0 25px rgba(0,200,255,.5)";
    }

    else if(nilai>=60){

        hasil.innerHTML=
        "🙂 Nilai C • Cukup";

        hasil.style.boxShadow=
        "0 0 25px rgba(255,255,0,.4)";
    }

    else if(nilai>=40){

        hasil.innerHTML=
        "😐 Nilai D • Kurang";

        hasil.style.boxShadow=
        "0 0 25px rgba(255,150,0,.4)";
    }

    else{

        hasil.innerHTML=
        "❌ Nilai E • Gagal";

        hasil.style.boxShadow=
        "0 0 25px rgba(255,0,80,.5)";
    }
}

</script>

</body>
</html>
