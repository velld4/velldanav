<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operator Javascript • Space Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top,#312e81,#020617 50%),
    linear-gradient(135deg,#020617,#0f172a,#111827);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* ========================= */
/* BINTANG */
/* ========================= */

.star{
    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    animation:blink 3s infinite alternate;
}

@keyframes blink{

    from{
        opacity:.2;
        transform:scale(.7);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ========================= */
/* PLANET */
/* ========================= */

.planet{

    position:absolute;

    width:420px;
    height:420px;

    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,
    rgba(0,255,255,.8),
    rgba(123,97,255,.3),
    transparent 70%);

    top:-150px;
    right:-150px;

    filter:blur(15px);

    animation:planetMove 10s ease-in-out infinite alternate;
}

@keyframes planetMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(40px);
    }
}

/* ========================= */
/* ORBIT */
/* ========================= */

.orbit{

    position:absolute;

    width:650px;
    height:650px;

    border:1px solid rgba(255,255,255,.06);

    border-radius:50%;

    animation:rotate 30s linear infinite;
}

.orbit::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    background:#00f5ff;

    border-radius:50%;

    top:-9px;
    left:50%;

    box-shadow:0 0 25px #00f5ff;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* ========================= */
/* CARD */
/* ========================= */

.container{

    position:relative;

    z-index:5;

    width:430px;
    max-width:92vw;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.10);

    box-shadow:
    0 10px 40px rgba(0,0,0,.5);

    animation:showUp 1s ease;
}

@keyframes showUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* BUTTON BACK */
/* ========================= */

.btn-back{

    position:absolute;

    top:20px;
    left:20px;

    border:none;

    padding:10px 18px;

    border-radius:16px;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    color:white;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;
}

.btn-back:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(0,255,255,.4);
}

/* ========================= */
/* HEADER */
/* ========================= */

.logo{

    width:95px;
    height:95px;

    margin:auto;

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:45px;

    background:
    linear-gradient(135deg,#00f5ff,#7c3aed);

    animation:float 3s ease-in-out infinite;

    box-shadow:0 0 40px rgba(0,255,255,.4);
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

h1{

    margin-top:20px;

    text-align:center;

    font-size:2.3em;

    background:
    linear-gradient(90deg,#fff,#00f5ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{

    text-align:center;

    margin-top:8px;

    opacity:.75;
}

/* ========================= */
/* INPUT */
/* ========================= */

.input-box{

    margin-top:25px;

    display:flex;

    flex-direction:column;

    gap:14px;
}

input{

    padding:14px;

    border:none;

    border-radius:16px;

    background:rgba(255,255,255,.10);

    color:white;

    outline:none;

    font-size:15px;

    transition:.3s;
}

input:focus{

    transform:scale(1.03);

    box-shadow:0 0 20px rgba(0,255,255,.3);
}

input::placeholder{

    color:rgba(255,255,255,.6);
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn-group{

    display:flex;

    gap:12px;

    margin-top:18px;
}

button{

    flex:1;

    border:none;

    padding:14px;

    border-radius:16px;

    color:white;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;
}

.btn-hitung{

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    box-shadow:0 10px 25px rgba(0,255,255,.3);
}

.btn-reset{

    background:
    linear-gradient(90deg,#ff0080,#ff4fd8);

    box-shadow:0 10px 25px rgba(255,0,128,.3);
}

button:hover{

    transform:
    translateY(-5px)
    scale(1.03);
}

/* ========================= */
/* HASIL */
/* ========================= */

#hasil{

    margin-top:22px;

    display:grid;

    gap:12px;
}

.item{

    padding:14px;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.06);

    transition:.3s;

    animation:fade .5s ease;
}

.item:hover{

    transform:translateX(8px);

    background:rgba(255,255,255,.12);
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:600px){

    h1{
        font-size:1.8em;
    }

    .container{
        padding:25px;
    }

    .btn-group{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<!-- BINTANG -->

<script>

for(let i=0;i<100;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=
    (2+Math.random()*4)+"s";

    document.body.appendChild(star);
}

</script>

<div class="planet"></div>

<div class="orbit"></div>

<!-- CARD -->

<div class="container">

    <!-- BACK -->

    <button class="btn-back"
    onclick="kembali()">
        ⬅ Back
    </button>

    <!-- LOGO -->

    <div class="logo">
        🪐
    </div>

    <h1>Operator Javascript</h1>

    <p class="desc">
        Jelajahi operasi matematika di luar angkasa 🚀
    </p>

    <!-- INPUT -->

    <div class="input-box">

        <input type="number"
        id="angka1"
        placeholder="Masukkan angka pertama">

        <input type="number"
        id="angka2"
        placeholder="Masukkan angka kedua">

    </div>

    <!-- BUTTON -->

    <div class="btn-group">

        <button class="btn-hitung"
        onclick="hitung()">
            ⚡ Hitung
        </button>

        <button class="btn-reset"
        onclick="resetData()">
            🔄 Reset
        </button>

    </div>

    <!-- HASIL -->

    <div id="hasil"></div>

</div>

<script>

function kembali(){

    window.location.href="index.html";
}

/* HITUNG */

function hitung(){

    let a=
    parseFloat(
    document.getElementById("angka1").value
    );

    let b=
    parseFloat(
    document.getElementById("angka2").value
    );

    if(isNaN(a) || isNaN(b)){

        document.getElementById("hasil").innerHTML=
        `
        <div class="item">
        ⚠️ Masukkan angka yang valid!
        </div>
        `;

        return;
    }

    let hasil=`

    <div class="item">
    ➕ Penjumlahan : ${a+b}
    </div>

    <div class="item">
    ➖ Pengurangan : ${a-b}
    </div>

    <div class="item">
    ✖️ Perkalian : ${a*b}
    </div>

    <div class="item">
    ➗ Pembagian : ${(a/b).toFixed(2)}
    </div>

    <div class="item">
    🧩 Modulus : ${a%b}
    </div>

    <div class="item">
    📈 Apakah ${a} > ${b}? : ${a>b}
    </div>

    <div class="item">
    ⚖️ Apakah ${a} == ${b}? : ${a==b}
    </div>
    `;

    document.getElementById("hasil").innerHTML=
    hasil;
}

/* RESET */

function resetData(){

    document.getElementById("angka1").value="";

    document.getElementById("angka2").value="";

    document.getElementById("hasil").innerHTML="";
}

</script>

</body>
</html>
