<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perulangan Javascript • Cyber Loop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#0f172a,#020617 50%),
    linear-gradient(135deg,#020617,#111827,#1e293b);

    color:white;

    position:relative;
}

/* ======================= */
/* BACKGROUND STARS */
/* ======================= */

.star{
    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    animation:blink 3s infinite alternate;
}

@keyframes blink{

    from{
        opacity:.2;
        transform:scale(.5);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ======================= */
/* GLOW EFFECT */
/* ======================= */

.glow{

    position:absolute;

    width:450px;
    height:450px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(0,255,255,.25),
    transparent 70%);

    top:-150px;
    right:-150px;

    filter:blur(40px);

    animation:floatGlow 8s ease-in-out infinite alternate;
}

@keyframes floatGlow{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(50px);
    }
}

/* ======================= */
/* ROTATING RING */
/* ======================= */

.ring{

    position:absolute;

    width:650px;
    height:650px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.05);

    animation:rotate 30s linear infinite;
}

.ring::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:#00f5ff;

    top:-9px;
    left:50%;

    box-shadow:0 0 20px #00f5ff;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* ======================= */
/* MAIN CARD */
/* ======================= */

.container{

    position:relative;

    z-index:10;

    width:430px;
    max-width:92vw;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);

    animation:showUp 1s ease;
}

@keyframes showUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ======================= */
/* BACK BUTTON */
/* ======================= */

.btn-back{

    position:absolute;

    top:20px;
    left:20px;

    border:none;

    padding:10px 18px;

    border-radius:15px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    transition:.3s;
}

.btn-back:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    box-shadow:
    0 10px 25px rgba(0,255,255,.4);
}

/* ======================= */
/* LOGO */
/* ======================= */

.logo{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:30px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:45px;

    background:
    linear-gradient(135deg,#00f5ff,#7c3aed);

    box-shadow:
    0 0 35px rgba(0,255,255,.4);

    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ======================= */
/* TITLE */
/* ======================= */

h1{

    margin-top:20px;

    text-align:center;

    font-size:2.2em;

    background:
    linear-gradient(90deg,#fff,#00f5ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{

    text-align:center;

    margin-top:8px;

    opacity:.8;
}

/* ======================= */
/* INPUT AREA */
/* ======================= */

.box{

    margin-top:25px;

    display:flex;
    flex-direction:column;
    gap:15px;
}

input{

    padding:15px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.10);

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;
}

input:focus{

    transform:scale(1.03);

    box-shadow:
    0 0 20px rgba(0,255,255,.3);
}

input::placeholder{

    color:rgba(255,255,255,.6);
}

/* ======================= */
/* BUTTON */
/* ======================= */

.btn-loop{

    border:none;

    padding:15px;

    border-radius:18px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(90deg,#00f5ff,#7c3aed);

    box-shadow:
    0 10px 25px rgba(0,255,255,.3);

    transition:.3s;
}

.btn-loop:hover{

    transform:
    translateY(-5px)
    scale(1.03);
}

/* ======================= */
/* RESULT */
/* ======================= */

#hasil{

    margin-top:20px;

    max-height:240px;

    overflow-y:auto;

    padding-right:5px;
}

/* SCROLL */

#hasil::-webkit-scrollbar{
    width:6px;
}

#hasil::-webkit-scrollbar-thumb{
    background:#00f5ff;
    border-radius:20px;
}

/* ITEM */

.item{

    padding:14px;

    margin:10px 0;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.06);

    animation:fade .4s ease;

    transition:.3s;
}

.item:hover{

    transform:translateX(8px);

    background:rgba(255,255,255,.12);
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ======================= */
/* RESPONSIVE */
/* ======================= */

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:1.8em;
    }
}

</style>
</head>

<body>

<!-- BINTANG -->

<script>

for(let i=0;i<120;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=
    (2+Math.random()*4)+"s";

    document.body.appendChild(star);
}

</script>

<div class="glow"></div>

<div class="ring"></div>

<!-- MAIN -->

<div class="container">

    <!-- BACK -->

    <button class="btn-back"
    onclick="kembali()">
        ⬅ Back
    </button>

    <!-- LOGO -->

    <div class="logo">
        🔁
    </div>

    <!-- TITLE -->

    <h1>Perulangan JS</h1>

    <p class="desc">
        Jalankan looping dengan tampilan cyber 🚀
    </p>

    <!-- BOX -->

    <div class="box">

        <input
        type="number"
        id="jumlah"
        placeholder="Masukkan jumlah loop">

        <button
        class="btn-loop"
        onclick="jalankanLoop()">

            ⚡ Mulai Loop

        </button>

        <div id="hasil"></div>

    </div>

</div>

<script>

/* BACK */

function kembali(){

    window.location.href="index.html";
}

/* LOOP */

function jalankanLoop(){

    let jumlah=
    document.getElementById("jumlah").value;

    let hasil=
    document.getElementById("hasil");

    if(jumlah==="" || jumlah<=0){

        hasil.innerHTML=
        `
        <div class="item">
        ⚠️ Masukkan angka yang valid!
        </div>
        `;

        return;
    }

    let output="";

    for(let i=1;i<=jumlah;i++){

        output +=
        `
        <div class="item">
        🚀 Perulangan ke-${i}
        </div>
        `;
    }

    hasil.innerHTML=output;
}

</script>

</body>
</html>
