<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELAJAR COYY</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            overflow:hidden;

            background:
            radial-gradient(circle at top left,#ff0080,transparent 30%),
            radial-gradient(circle at bottom right,#7928ca,transparent 30%),
            linear-gradient(135deg,#0f172a,#1e293b,#111827);

            color:white;
            text-align:center;

            display:flex;
            justify-content:center;
            align-items:center;

            position:relative;
        }

        /* ========================= */
        /* PARTIKEL ANIMASI */
        /* ========================= */

        .particle{
            position:absolute;
            width:10px;
            height:10px;
            border-radius:50%;
            background:white;
            opacity:.5;
            animation:float 10s linear infinite;
        }

        @keyframes float{
            from{
                transform:translateY(100vh) scale(0);
            }

            to{
                transform:translateY(-120vh) scale(1.5);
            }
        }

        /* ========================= */
        /* CARD */
        /* ========================= */

        .container{

            width:420px;
            max-width:92vw;

            padding:35px;

            border-radius:30px;

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.15);

            box-shadow:
            0 15px 45px rgba(0,0,0,.5),
            inset 0 0 20px rgba(255,255,255,.05);

            animation:muncul 1s ease;
        }

        @keyframes muncul{
            from{
                opacity:0;
                transform:translateY(50px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* ========================= */
        /* LOGO */
        /* ========================= */

        .logo{
            width:100px;
            height:100px;

            margin:auto;

            border-radius:25px;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:45px;

            background:linear-gradient(135deg,#ff0080,#7928ca);

            box-shadow:0 0 35px rgba(255,0,128,.5);

            animation:muter 8s linear infinite;
        }

        @keyframes muter{
            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }
        }

        /* ========================= */
        /* TEXT */
        /* ========================= */

        h1{
            margin-top:25px;
            font-size:2.7em;

            background:linear-gradient(90deg,#ffffff,#ff9ff3);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            animation:glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                text-shadow:0 0 10px rgba(255,255,255,.3);
            }

            to{
                text-shadow:0 0 25px rgba(255,0,128,.7);
            }
        }

        p{
            opacity:.8;
            margin-top:10px;
        }

        /* ========================= */
        /* OUTPUT */
        /* ========================= */

        #hasil-output{

            margin-top:25px;

            padding:18px;

            border-radius:18px;

            background:rgba(255,255,255,.10);

            min-height:70px;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:1.2em;

            transition:.4s;

            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%{
                box-shadow:0 0 0 rgba(255,0,128,0);
            }

            50%{
                box-shadow:0 0 25px rgba(255,0,128,.4);
            }

            100%{
                box-shadow:0 0 0 rgba(255,0,128,0);
            }
        }

        /* ========================= */
        /* BUTTON */
        /* ========================= */

        .btn-group{
            display:flex;
            gap:12px;

            margin-top:25px;
        }

        button{

            flex:1;

            padding:14px;

            border:none;
            border-radius:16px;

            color:white;

            font-size:15px;
            font-weight:bold;

            cursor:pointer;

            transition:.3s;

            position:relative;
            overflow:hidden;
        }

        button::before{
            content:"";

            position:absolute;

            width:300%;
            height:300%;

            background:rgba(255,255,255,.15);

            top:-100%;
            left:-100%;

            transform:rotate(25deg);

            transition:.6s;
        }

        button:hover::before{
            top:100%;
            left:100%;
        }

        button:hover{
            transform:translateY(-5px) scale(1.03);
        }

        .btn-click{
            background:linear-gradient(90deg,#ff0080,#ff4fd8);
            box-shadow:0 10px 25px rgba(255,0,128,.3);
        }

        .btn-back{
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            box-shadow:0 10px 25px rgba(0,114,255,.3);
        }

        /* ========================= */
        /* ICON MENU */
        /* ========================= */

        .menu-icon{
            display:flex;
            justify-content:center;
            gap:15px;

            margin-top:25px;

            font-size:28px;
        }

        .menu-icon span{
            animation:naikTurun 2s infinite ease-in-out;
        }

        .menu-icon span:nth-child(2){
            animation-delay:.3s;
        }

        .menu-icon span:nth-child(3){
            animation-delay:.6s;
        }

        @keyframes naikTurun{
            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-8px);
            }

            100%{
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

    <!-- PARTIKEL -->
    <script>
        for(let i=0;i<35;i++){

            const p=document.createElement("div");

            p.className="particle";

            p.style.left=Math.random()*100+"vw";

            p.style.animationDuration=
            (5+Math.random()*10)+"s";

            p.style.opacity=Math.random();

            p.style.width=
            p.style.height=
            (5+Math.random()*12)+"px";

            document.body.appendChild(p);
        }
    </script>

    <!-- CONTAINER -->

    <div class="container">

        <!-- LOGO -->

        <div class="logo">
            🚀
        </div>

        <h1>Belajar Coyy</h1>


        <!-- ICON -->

        <div class="menu-icon">
            <span>🔥</span>
            <span>⚡</span>
            <span>💻</span>
        </div>

        <!-- OUTPUT -->

        <div id="hasil-output">
            Kosong...
        </div>

        <!-- BUTTON -->

        <div class="btn-group">

            <button class="btn-click"
            onclick="tampilkanPesan()">
                🎯 Klik
            </button>

            <button class="btn-back"
            onclick="kembaliKeIndex()">
                ⬅ Back
            </button>

        </div>

    </div>

    <script>

        function tampilkanPesan(){

            var hasil =
            document.getElementById("hasil-output");

            var pesan = [

                "🔥 Kamu keren banget hari ini!",

                "🚀 Semangat belajar coding!",

                "😎 Skill kamu naik level!",

                "⚡ JavaScript makin mudah!",

                "💻 Programmer masa depan!",

                "🎉 Tetap semangat belajar!"
            ];

            var random =
            Math.floor(Math.random()*pesan.length);

            hasil.innerHTML =
            "<b>"+pesan[random]+"</b>";

            hasil.style.transform="scale(1.08)";

            setTimeout(()=>{
                hasil.style.transform="scale(1)";
            },300);
        }

        function kembaliKeIndex(){

            window.location.href="index.html";
        }

    </script>

</body>
</html>
